<!--
  =====================================================================
  MY NAGHI — Customer Feedback Widget  (Star Rating Edition)
  ---------------------------------------------------------------------
  Self-contained, dependency-free feedback popup for mynaghi.sa.

  Flow:  5-star rating  →  context-aware follow-up question  →  thanks.
  Bilingual (Arabic default / English), full RTL, auto user-type
  detection from the URL, submits to Google Forms.

  HOW TO USE
    - Standalone test:  open this file directly in a browser.
    - Production embed: see INTEGRATION_GUIDE.md.

  EVERYTHING CONFIGURABLE LIVES AT THE TOP OF THE <script> BLOCK:
    FEEDBACK_CONFIG · FORCE_USER_TYPE · AUTO_OPEN_AFTER_MS ·
    AUTO_OPEN_ON_SCROLL_PERCENT · STRINGS · QUESTIONS
  Colors are CSS variables at the top of the <style> block.

  No build step. No frameworks. Vanilla HTML/CSS/JS only.
  =====================================================================
-->
<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MY NAGHI — Feedback Widget</title>
</head>
<body>

<!-- ================= MYNAGHI WIDGET START =================
     To embed: copy everything from this line down to
     "MYNAGHI WIDGET END" and paste it just before </body>. -->

<!-- Space Grotesk — the only external dependency -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
  rel="stylesheet"
/>

<style>
  /* ==============================================================
     DESIGN TOKENS — change these to re-theme the whole widget
     ============================================================== */
  #mn-feedback-root {
    --mn-lilac:        #964BFA;   /* primary — CTAs, active states  */
    --mn-lilac-dark:   #6F2DD4;   /* hover on primary buttons       */
    --mn-lilac-subtle: #F2EAFF;   /* hover bg on option buttons     */
    --mn-black:        #1A1A1A;   /* primary text                   */
    --mn-bluegrey:     #6B7D99;   /* secondary text                 */
    --mn-bluegrey-lt:  #A8B4C8;   /* muted hints / captions         */
    --mn-sand:         #EDE5D0;   /* header accent                  */
    --mn-sand-lt:      #F6F1E6;   /* header background              */
    --mn-grey-100:     #F5F5F5;   /* footer background              */
    --mn-grey-200:     #E8E8E8;   /* borders, unfilled stars        */
    --mn-gold:         #F5B301;   /* filled stars ONLY              */
    --mn-white:        #FFFFFF;
    --mn-error:        #C6432E;   /* inline validation message      */

    --mn-radius:       12px;      /* option buttons, inputs         */
    --mn-radius-card:  16px;      /* modal card                     */
    --mn-radius-pill:  9999px;    /* pills                          */

    --mn-shadow-card:   0 12px 40px rgba(26, 26, 26, 0.14);
    --mn-shadow-accent: 0 4px 24px rgba(150, 75, 250, 0.2);

    --mn-ease: cubic-bezier(0.25, 0.1, 0.25, 1);

    --mn-font: "Space Grotesk", "Segoe UI", Tahoma, system-ui, sans-serif;
    --mn-z: 2147483000;
  }

  /* ==============================================================
     SCOPING — every rule is prefixed with #mn-feedback-root so the
     widget never leaks styles into (or inherits junk from) the page
     ============================================================== */
  #mn-feedback-root,
  #mn-feedback-root *,
  #mn-feedback-root *::before,
  #mn-feedback-root *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  #mn-feedback-root {
    font-family: var(--mn-font);
    color: var(--mn-black);
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  #mn-feedback-root button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    background: none;
    color: inherit;
  }

  #mn-feedback-root button:focus-visible,
  #mn-feedback-root textarea:focus-visible {
    outline: 2px solid var(--mn-lilac);
    outline-offset: 2px;
  }

  /* ---------------- Floating trigger button ---------------- */
  #mn-feedback-root .mn-fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--mn-lilac);
    color: var(--mn-white);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--mn-shadow-accent);
    z-index: var(--mn-z);
    transition: transform 200ms var(--mn-ease), box-shadow 200ms var(--mn-ease);
  }
  /* In Arabic (RTL) mode the trigger sits bottom-LEFT */
  #mn-feedback-root[data-dir="rtl"] .mn-fab { right: auto; left: 24px; }
  #mn-feedback-root .mn-fab:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(150, 75, 250, 0.32);
  }
  #mn-feedback-root .mn-fab:active { transform: scale(0.97); }
  #mn-feedback-root .mn-fab svg { width: 28px; height: 28px; fill: currentColor; }
  #mn-feedback-root .mn-fab[hidden] { display: none; }

  /* ---------------- Overlay + modal card ---------------- */
  #mn-feedback-root .mn-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26, 26, 26, 0.5);
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: var(--mn-z);
    opacity: 0;
    transition: opacity 300ms var(--mn-ease);
  }
  #mn-feedback-root .mn-overlay.mn-open { opacity: 1; }
  #mn-feedback-root .mn-overlay[hidden] { display: none; }

  #mn-feedback-root .mn-modal {
    background: var(--mn-white);
    border-radius: var(--mn-radius-card);
    box-shadow: var(--mn-shadow-card);
    width: 100%;
    max-width: 440px;
    max-height: 90vh;
    max-height: 90dvh;
    overflow-y: auto;
    overflow-x: hidden;
    transform: translateY(24px);
    opacity: 0;
    transition: transform 300ms var(--mn-ease), opacity 300ms var(--mn-ease);
  }
  #mn-feedback-root .mn-overlay.mn-open .mn-modal {
    transform: translateY(0);
    opacity: 1;
  }

  /* ---------------- Header ---------------- */
  #mn-feedback-root .mn-header {
    position: relative;
    background: var(--mn-sand-lt);
    padding: 22px 24px 18px;
  }
  #mn-feedback-root .mn-brand {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--mn-bluegrey);
    margin-bottom: 8px;
  }
  #mn-feedback-root .mn-title {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--mn-black);
  }
  #mn-feedback-root .mn-subtitle {
    font-size: 15px;
    font-weight: 400;
    color: var(--mn-bluegrey);
    margin-top: 4px;
  }

  /* Close button — flips to the top-LEFT in RTL via inset-inline-end */
  #mn-feedback-root .mn-close {
    position: absolute;
    top: 12px;
    inset-inline-end: 12px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--mn-bluegrey);
    transition: background 150ms var(--mn-ease), color 150ms var(--mn-ease);
  }
  #mn-feedback-root .mn-close:hover { background: var(--mn-sand); color: var(--mn-black); }
  #mn-feedback-root .mn-close:active { transform: scale(0.97); }
  #mn-feedback-root .mn-close svg { width: 18px; height: 18px; stroke: currentColor; }

  /* Language pills */
  #mn-feedback-root .mn-langs {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }
  #mn-feedback-root .mn-lang {
    min-height: 44px;
    padding: 0 20px;
    border-radius: var(--mn-radius-pill);
    background: var(--mn-grey-200);
    color: var(--mn-bluegrey);
    font-size: 14px;
    font-weight: 600;
    transition: background 150ms var(--mn-ease), color 150ms var(--mn-ease),
                transform 150ms var(--mn-ease);
  }
  #mn-feedback-root .mn-lang:hover { background: #DEDEDE; }
  #mn-feedback-root .mn-lang:active { transform: scale(0.97); }
  #mn-feedback-root .mn-lang.mn-active {
    background: var(--mn-lilac);
    color: var(--mn-white);
  }
  #mn-feedback-root .mn-lang.mn-active:hover { background: var(--mn-lilac-dark); }

  /* ---------------- Body / steps ---------------- */
  #mn-feedback-root .mn-body { padding: 24px 20px; }
  #mn-feedback-root .mn-step[hidden] { display: none; }

  #mn-feedback-root .mn-question {
    font-size: 17px;
    font-weight: 500;
    line-height: 1.4;
    color: var(--mn-black);
    text-align: center;
  }

  /* --- Step 1: stars ---
     The row is forced LTR in BOTH languages: star fill always grows
     left→right, the standard convention in Saudi apps. */
  #mn-feedback-root .mn-stars {
    direction: ltr;
    display: flex;
    justify-content: center;
    gap: clamp(0px, 1.5vw, 8px);
    margin-top: 18px;
  }
  #mn-feedback-root .mn-star {
    width: 56px;               /* ≥56px touch target for 40+ users */
    height: 56px;
    flex-shrink: 0;            /* never squeeze below the touch target */
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--mn-radius);
    color: var(--mn-grey-200); /* unfilled */
    transition: transform 180ms var(--mn-ease), color 180ms var(--mn-ease);
  }
  #mn-feedback-root .mn-star svg { width: 38px; height: 38px; fill: currentColor; }
  #mn-feedback-root .mn-star.mn-on { color: var(--mn-gold); }   /* filled */
  #mn-feedback-root .mn-star:hover,
  #mn-feedback-root .mn-star:focus-visible,
  #mn-feedback-root .mn-star:active { transform: scale(1.15); }

  #mn-feedback-root .mn-caption {
    min-height: 24px;          /* reserved so appearing text never shifts layout */
    margin-top: 14px;
    font-size: 16px;
    font-weight: 600;
    text-align: center;
    color: var(--mn-black);
  }
  #mn-feedback-root .mn-hint {
    margin-top: 6px;
    font-size: 13px;
    text-align: center;
    color: var(--mn-bluegrey-lt);
  }

  /* --- Step 2: follow-up question + text --- */
  #mn-feedback-root .mn-mini {
    direction: ltr;
    display: flex;
    justify-content: center;
    gap: 2px;
    color: var(--mn-grey-200);
  }
  #mn-feedback-root .mn-mini svg { width: 28px; height: 28px; fill: currentColor; }
  #mn-feedback-root .mn-mini svg.mn-on { color: var(--mn-gold); }
  #mn-feedback-root .mn-mini-caption {
    margin-top: 4px;
    margin-bottom: 16px;
    font-size: 13px;
    text-align: center;
    color: var(--mn-bluegrey-lt);
  }

  #mn-feedback-root .mn-textarea {
    width: 100%;
    min-height: 110px;
    margin-top: 14px;
    padding: 14px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 400;
    color: var(--mn-black);
    background: var(--mn-white);
    border: 1.5px solid var(--mn-grey-200);
    border-radius: var(--mn-radius);
    resize: vertical;
    transition: border-color 150ms var(--mn-ease);
  }
  #mn-feedback-root .mn-textarea::placeholder { color: var(--mn-bluegrey-lt); }
  #mn-feedback-root .mn-textarea:focus {
    outline: none;
    border-color: var(--mn-lilac);
  }

  #mn-feedback-root .mn-error {
    margin-top: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--mn-error);
  }
  #mn-feedback-root .mn-error[hidden] { display: none; }

  #mn-feedback-root .mn-submit {
    width: 100%;
    min-height: 52px;
    margin-top: 16px;
    border-radius: var(--mn-radius);
    background: var(--mn-lilac);
    color: var(--mn-white);
    font-size: 15px;
    font-weight: 600;
    box-shadow: var(--mn-shadow-accent);
    transition: background 150ms var(--mn-ease), transform 150ms var(--mn-ease),
                opacity 150ms var(--mn-ease);
  }
  #mn-feedback-root .mn-submit:hover:not(:disabled) { background: var(--mn-lilac-dark); }
  #mn-feedback-root .mn-submit:active:not(:disabled) { transform: scale(0.97); }
  #mn-feedback-root .mn-submit:disabled { opacity: 0.7; cursor: default; }

  #mn-feedback-root .mn-back {
    width: 100%;
    min-height: 52px;
    margin-top: 10px;
    border-radius: var(--mn-radius);
    background: transparent;
    border: 1px solid var(--mn-grey-200);
    color: var(--mn-bluegrey);
    font-size: 15px;
    font-weight: 500;
    transition: background 150ms var(--mn-ease), transform 150ms var(--mn-ease);
  }
  #mn-feedback-root .mn-back:hover { background: var(--mn-lilac-subtle); }
  #mn-feedback-root .mn-back:active { transform: scale(0.97); }

  /* --- Step 3: thank you --- */
  #mn-feedback-root .mn-step-3 { text-align: center; padding: 24px 0 16px; }
  #mn-feedback-root .mn-check {
    width: 72px;
    height: 72px;
    margin: 0 auto 16px;
    border-radius: 50%;
    background: var(--mn-lilac);
    color: var(--mn-white);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #mn-feedback-root .mn-check svg { width: 48px; height: 48px; stroke: currentColor; }
  #mn-feedback-root .mn-thanks {
    font-size: 18px;
    font-weight: 600;
    color: var(--mn-black);
  }

  /* ---------------- Footer ---------------- */
  #mn-feedback-root .mn-footer {
    background: var(--mn-grey-100);
    padding: 12px 20px;
    text-align: center;
    font-size: 13px;
    color: var(--mn-bluegrey-lt);
  }

  /* On very narrow phones the star row borrows the body's side
     padding so all five 56px touch targets still fit (5×56 = 280px). */
  @media (max-width: 379px) {
    #mn-feedback-root .mn-stars {
      gap: 0;
      margin-left: -20px;
      margin-right: -20px;
    }
  }

  /* ---------------- Reduced motion ---------------- */
  @media (prefers-reduced-motion: reduce) {
    #mn-feedback-root *,
    #mn-feedback-root *::before,
    #mn-feedback-root *::after {
      transition: none !important;
      animation: none !important;
    }
  }
</style>

<div id="mn-feedback-root" data-dir="rtl">

  <!-- Floating trigger -->
  <button class="mn-fab" type="button" aria-haspopup="dialog">
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
    </svg>
  </button>

  <!-- Modal -->
  <div class="mn-overlay" hidden>
    <div class="mn-modal" role="dialog" aria-modal="true" aria-labelledby="mn-title">

      <header class="mn-header">
        <button class="mn-close" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"
               aria-hidden="true" focusable="false">
            <path d="M6 6l12 12M18 6L6 18"/>
          </svg>
        </button>
        <div class="mn-brand">MY NAGHI</div>
        <h2 class="mn-title" id="mn-title"></h2>
        <p class="mn-subtitle"></p>
        <div class="mn-langs">
          <button class="mn-lang" type="button" data-lang="ar" lang="ar">العربية</button>
          <button class="mn-lang" type="button" data-lang="en" lang="en">EN</button>
        </div>
      </header>

      <div class="mn-body">

        <!-- STEP 1 — star rating -->
        <section class="mn-step mn-step-1">
          <p class="mn-question mn-q1"></p>
          <div class="mn-stars" role="radiogroup">
            <button class="mn-star" type="button" role="radio" aria-checked="false" data-value="1">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
            </button>
            <button class="mn-star" type="button" role="radio" aria-checked="false" data-value="2">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
            </button>
            <button class="mn-star" type="button" role="radio" aria-checked="false" data-value="3">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
            </button>
            <button class="mn-star" type="button" role="radio" aria-checked="false" data-value="4">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
            </button>
            <button class="mn-star" type="button" role="radio" aria-checked="false" data-value="5">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
            </button>
          </div>
          <p class="mn-caption" aria-live="polite"></p>
          <p class="mn-hint">اضغط على النجوم للتقييم · Tap the stars to rate</p>
        </section>

        <!-- STEP 2 — follow-up question + answer -->
        <section class="mn-step mn-step-2" hidden>
          <div class="mn-mini" aria-hidden="true"></div>
          <p class="mn-mini-caption"></p>
          <p class="mn-question mn-q2" id="mn-q2"></p>
          <textarea class="mn-textarea" rows="4" aria-labelledby="mn-q2"
                    aria-describedby="mn-error"></textarea>
          <p class="mn-error" id="mn-error" role="alert" hidden></p>
          <button class="mn-submit" type="button"></button>
          <button class="mn-back" type="button"></button>
        </section>

        <!-- STEP 3 — thank you -->
        <section class="mn-step mn-step-3" hidden>
          <div class="mn-check">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round"
                 stroke-linejoin="round" aria-hidden="true" focusable="false">
              <path d="M4.5 12.5l5 5L19.5 7"/>
            </svg>
          </div>
          <p class="mn-thanks" role="status"></p>
        </section>

      </div>

      <footer class="mn-footer"><span class="mn-footer-text"></span></footer>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  /* ================================================================
     ⚙️  CONFIG — everything the site team may need to change
     ================================================================ */

  // Google Forms destination. Replace formId and every entry.XXXXXXXXX
  // with your own values — see INTEGRATION_GUIDE.md, section 1.
  const FEEDBACK_CONFIG = {
    formId: 'YOUR_FORM_ID',
    fields: {
      language: 'entry.XXXXXXXXX',
      userType: 'entry.XXXXXXXXX',
      rating:   'entry.XXXXXXXXX',
      answer:   'entry.XXXXXXXXX',
      pageUrl:  'entry.XXXXXXXXX'
    }
  };

  // Force a user type for testing, e.g. 'buyers'. null = auto-detect.
  // Valid: 'visitors' | 'searchers' | 'viewers' | 'comparers' |
  //        'buyers' | 'inquiries' | 'after-sales'
  const FORCE_USER_TYPE = null;

  // Auto-open triggers. Both default to null = the widget opens ONLY
  // via the floating button (recommended for this audience).
  const AUTO_OPEN_AFTER_MS = null;          // e.g. 30000 = open after 30s
  const AUTO_OPEN_ON_SCROLL_PERCENT = null; // e.g. 60 = open at 60% scroll

  /* ================================================================
     🌍  ALL user-facing strings (nothing is hardcoded in the logic)
     ================================================================ */
  const STRINGS = {
    ar: {
      dir: 'rtl',
      title: 'شاركنا رأيك',
      subtitle: 'رأيك يساعدنا على تحسين تجربتك',
      q1: 'كيف كانت تجربتك معنا؟',
      starsGroup: 'قيّم تجربتك من نجمة واحدة إلى خمس نجوم',
      star: 'من 5',
      placeholder: 'اكتب إجابتك هنا...',
      submit: 'إرسال',
      sending: 'جاري الإرسال...',
      back: 'رجوع',
      thanks: 'شكراً على ملاحظاتك!',
      emptyError: 'من فضلك اكتب إجابتك',
      close: 'إغلاق',
      fab: 'شاركنا رأيك',
      footer: 'ملاحظاتك تصل مباشرة إلى فريق ناغي'
    },
    en: {
      dir: 'ltr',
      title: 'Share your feedback',
      subtitle: 'Your feedback helps us improve your experience',
      q1: 'How was your experience with us?',
      starsGroup: 'Rate your experience from one to five stars',
      star: 'of 5',
      placeholder: 'Type your answer here...',
      submit: 'Send Feedback',
      sending: 'Sending...',
      back: 'Back',
      thanks: 'Thank you for your feedback!',
      emptyError: 'Please write your answer',
      close: 'Close',
      fab: 'Share your feedback',
      footer: 'Your feedback goes directly to the NAGHI team'
    }
  };

  // Rating captions are shown in BOTH languages at once (per design),
  // so one string per rating. Index 0 = 1 star ... index 4 = 5 stars.
  const RATING_LABELS = [
    'سيء جداً · Very poor',
    'سيء · Poor',
    'جيد · Okay',
    'جيد جداً · Good',
    'ممتاز · Excellent'
  ];

  /* ================================================================
     ❓  QUESTION MATRIX — 7 user types × 5 ratings × 2 languages
     ================================================================ */
  const QUESTIONS = {
    'visitors': {
      1: { en: 'What could we improve on our website?', ar: 'ما الذي يمكننا تحسينه في موقعنا؟' },
      2: { en: 'What information was missing?', ar: 'ما المعلومات التي كانت ناقصة؟' },
      3: { en: 'What could be better?', ar: 'ما الذي يمكن أن يكون أفضل؟' },
      4: { en: 'What did you like most about our site?', ar: 'ما الذي أعجبك أكثر في موقعنا؟' },
      5: { en: 'Would you recommend us to others? What stood out?', ar: 'هل ستوصي بنا للآخرين؟ ما الذي ميّزنا؟' }
    },
    'searchers': {
      1: { en: 'Was it hard to find what you needed?', ar: 'هل كان من الصعب العثور على ما تحتاجه؟' },
      2: { en: 'What were you searching for?', ar: 'عمّ كنت تبحث؟' },
      3: { en: 'Did you find what you were looking for?', ar: 'هل وجدت ما كنت تبحث عنه؟' },
      4: { en: 'What made your search easy?', ar: 'ما الذي جعل بحثك سهلاً؟' },
      5: { en: 'Would you search on our site again?', ar: 'هل ستبحث في موقعنا مرة أخرى؟' }
    },
    'viewers': {
      1: { en: 'What product information was missing?', ar: 'ما معلومات المنتج التي كانت ناقصة؟' },
      2: { en: 'What details would help you decide?', ar: 'ما التفاصيل التي تساعدك على اتخاذ القرار؟' },
      3: { en: 'Were the product details clear enough?', ar: 'هل كانت تفاصيل المنتج واضحة بما يكفي؟' },
      4: { en: 'What helped you understand this product?', ar: 'ما الذي ساعدك على فهم هذا المنتج؟' },
      5: { en: 'Are you planning to purchase this product?', ar: 'هل تخطط لشراء هذا المنتج؟' }
    },
    'comparers': {
      1: { en: 'Was the comparison unclear or incomplete?', ar: 'هل كانت المقارنة غير واضحة أو ناقصة؟' },
      2: { en: 'Which features would help your comparison?', ar: 'ما الميزات التي تساعدك في المقارنة؟' },
      3: { en: 'Did the comparison help you decide?', ar: 'هل ساعدتك المقارنة على اتخاذ القرار؟' },
      4: { en: 'Which product are you leaning toward, and why?', ar: 'أي منتج تميل إليه، ولماذا؟' },
      5: { en: 'Will you complete the purchase?', ar: 'هل ستكمل عملية الشراء؟' }
    },
    'buyers': {
      1: { en: 'What went wrong during checkout?', ar: 'ما الذي حدث بشكل خاطئ أثناء إتمام الشراء؟' },
      2: { en: 'What made checkout difficult?', ar: 'ما الذي جعل إتمام الشراء صعباً؟' },
      3: { en: 'Was the checkout process clear?', ar: 'هل كانت عملية إتمام الشراء واضحة؟' },
      4: { en: 'What made checkout smooth for you?', ar: 'ما الذي جعل إتمام الشراء سلساً بالنسبة لك؟' },
      5: { en: 'Would you shop with us again?', ar: 'هل ستتسوق معنا مرة أخرى؟' }
    },
    'inquiries': {
      1: { en: 'What was the issue with your inquiry?', ar: 'ما المشكلة في استفسارك؟' },
      2: { en: 'How could we assist you better?', ar: 'كيف يمكننا مساعدتك بشكل أفضل؟' },
      3: { en: 'Is your inquiry being resolved adequately?', ar: 'هل يتم حل استفسارك بشكل مناسب؟' },
      4: { en: 'What helped you the most?', ar: 'ما الذي ساعدك أكثر؟' },
      5: { en: 'Are you satisfied with our response?', ar: 'هل أنت راضٍ عن ردنا؟' }
    },
    'after-sales': {
      1: { en: 'What is the issue with your order or delivery?', ar: 'ما المشكلة في طلبك أو التوصيل؟' },
      2: { en: 'What support do you need right now?', ar: 'ما الدعم الذي تحتاجه الآن؟' },
      3: { en: 'Is your issue being handled well?', ar: 'هل تتم معالجة مشكلتك بشكل جيد؟' },
      4: { en: 'What impressed you about our service?', ar: 'ما الذي أعجبك في خدمتنا؟' },
      5: { en: 'Would you order from us again?', ar: 'هل ستطلب منا مرة أخرى؟' }
    }
  };

  /* ================================================================
     🔎  USER-TYPE DETECTION
     The current URL (path + query) is matched against signals, most
     specific first, so e.g. "/products/compare" → comparers, not
     viewers. Anything unmatched falls back to 'visitors'.
     ================================================================ */
  function detectUserType() {
    if (FORCE_USER_TYPE && QUESTIONS[FORCE_USER_TYPE]) return FORCE_USER_TYPE;
    const url = (window.location.pathname + window.location.search).toLowerCase();
    if (/checkout|cart|payment/.test(url))            return 'buyers';
    if (/compare/.test(url))                          return 'comparers';
    if (/orders|order-history|account/.test(url))     return 'after-sales';
    if (/contact|inquiry|support/.test(url))          return 'inquiries';
    if (/search/.test(url))                           return 'searchers';
    if (/product/.test(url))                          return 'viewers';
    return 'visitors';
  }

  // Arabic is the default: only an explicitly-English page/browser
  // starts in English; anything else (Arabic or undetermined) → Arabic.
  function detectLanguage() {
    const raw = (document.documentElement.lang || navigator.language || '').toLowerCase();
    return raw.indexOf('en') === 0 ? 'en' : 'ar';
  }

  // Strip control characters and cap length. User text is only ever
  // written to the page via textContent (never innerHTML), so it can
  // never be interpreted as markup.
  function sanitize(value) {
    return value.replace(/[\u0000-\u001F\u007F]/g, ' ')
                .trim()
                .slice(0, 2000);
  }

  /* ================================================================
     🧩  ELEMENTS & STATE
     ================================================================ */
  const root = document.getElementById('mn-feedback-root');
  if (!root) return;
  const $ = (sel) => root.querySelector(sel);

  const fab       = $('.mn-fab');
  const overlay   = $('.mn-overlay');
  const modal     = $('.mn-modal');
  const closeBtn  = $('.mn-close');
  const titleEl   = $('.mn-title');
  const subtitleEl= $('.mn-subtitle');
  const langBtns  = Array.prototype.slice.call(root.querySelectorAll('.mn-lang'));
  const steps     = [$('.mn-step-1'), $('.mn-step-2'), $('.mn-step-3')];
  const q1El      = $('.mn-q1');
  const starsEl   = $('.mn-stars');
  const starBtns  = Array.prototype.slice.call(root.querySelectorAll('.mn-star'));
  const captionEl = $('.mn-caption');
  const miniEl    = $('.mn-mini');
  const miniCapEl = $('.mn-mini-caption');
  const q2El      = $('.mn-q2');
  const textarea  = $('.mn-textarea');
  const errorEl   = $('.mn-error');
  const submitBtn = $('.mn-submit');
  const backBtn   = $('.mn-back');
  const thanksEl  = $('.mn-thanks');
  const footerEl  = $('.mn-footer-text');

  let lang        = detectLanguage();
  let userType    = detectUserType();
  let rating      = 0;          // 0 = nothing selected yet
  let step        = 1;
  let isOpen      = false;
  let isSending   = false;
  let hasOpened   = false;      // auto-open fires at most once per page
  let advanceTimer = null;      // 400ms pause between star tap and step 2
  let closeTimer   = null;      // 2s thank-you auto-close

  // Build the 5 read-only mini stars shown at the top of step 2.
  const STAR_PATH = starBtns[0].querySelector('svg').outerHTML;
  miniEl.innerHTML = STAR_PATH + STAR_PATH + STAR_PATH + STAR_PATH + STAR_PATH;
  const miniStars = Array.prototype.slice.call(miniEl.querySelectorAll('svg'));

  /* ================================================================
     ⭐  STAR FILL LOGIC
     Tapping star N fills stars 1..N gold (standard star-rating fill).
     `renderStars` paints the committed rating; `paintFill` is also
     used for the transient hover preview.
     ================================================================ */
  function paintFill(n) {
    starBtns.forEach(function (btn, i) {
      btn.classList.toggle('mn-on', i < n);
    });
  }

  function renderStars() {
    paintFill(rating);
    starBtns.forEach(function (btn, i) {
      const value = i + 1;
      btn.setAttribute('aria-checked', value === rating ? 'true' : 'false');
      // Roving tabindex: the selected star (or the first, before any
      // selection) is the group's single tab stop.
      btn.tabIndex = (rating === 0 ? value === 1 : value === rating) ? 0 : -1;
    });
    captionEl.textContent = rating > 0 ? RATING_LABELS[rating - 1] : '';
  }

  // Select a rating (fill + caption + a11y state) without advancing.
  function selectRating(n) {
    if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
    rating = n;
    renderStars();
  }

  // Confirm the rating: show the fill for ~400ms, then go to step 2.
  function confirmRating(n) {
    selectRating(n);
    advanceTimer = setTimeout(function () {
      advanceTimer = null;
      showStep(2);
    }, 400);
  }

  starBtns.forEach(function (btn) {
    const value = parseInt(btn.getAttribute('data-value'), 10);
    // Click also covers Enter/Space on the focused star.
    btn.addEventListener('click', function () { confirmRating(value); });
    // Desktop hover preview: fill 1..N under the cursor.
    btn.addEventListener('mouseenter', function () {
      if (step === 1) paintFill(value);
    });
  });
  starsEl.addEventListener('mouseleave', function () { paintFill(rating); });

  // Arrow keys move the selection without advancing; Enter confirms.
  // The row is visually LTR in both languages, so Right = higher.
  starsEl.addEventListener('keydown', function (e) {
    let delta = 0;
    if (e.key === 'ArrowRight' || e.key === 'ArrowUp') delta = 1;
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') delta = -1;
    else return;
    e.preventDefault();
    const next = Math.min(5, Math.max(1, (rating || 0) + delta));
    selectRating(next);
    starBtns[next - 1].focus();
  });

  /* ================================================================
     🪜  STEPS
     ================================================================ */
  function showStep(n) {
    step = n;
    steps.forEach(function (el, i) { el.hidden = (i + 1 !== n); });

    if (n === 2) {
      // Context-aware question for this user type + rating.
      q2El.textContent = QUESTIONS[userType][rating][lang];
      miniStars.forEach(function (svg, i) {
        svg.classList.toggle('mn-on', i < rating);
      });
      miniCapEl.textContent = RATING_LABELS[rating - 1];
      errorEl.hidden = true;
      textarea.focus();
    } else if (n === 1) {
      renderStars();
      starBtns[Math.max(rating, 1) - 1].focus();
    }
  }

  backBtn.addEventListener('click', function () { showStep(1); });

  /* ================================================================
     🌐  LANGUAGE & RTL SWITCHING
     Re-paints every visible string and flips direction. The modal
     gets dir=rtl/ltr (mirroring the whole layout, incl. the close
     button via inset-inline-end); the root's data-dir moves the
     floating button; the star row itself stays LTR by design.
     ================================================================ */
  function applyLanguage() {
    const t = STRINGS[lang];
    root.setAttribute('data-dir', t.dir);
    modal.setAttribute('dir', t.dir);
    modal.setAttribute('lang', lang);

    titleEl.textContent    = t.title;
    subtitleEl.textContent = t.subtitle;
    q1El.textContent       = t.q1;
    thanksEl.textContent   = t.thanks;
    footerEl.textContent   = t.footer;
    errorEl.textContent    = t.emptyError;
    backBtn.textContent    = t.back;
    submitBtn.textContent  = isSending ? t.sending : t.submit;
    textarea.setAttribute('placeholder', t.placeholder);
    closeBtn.setAttribute('aria-label', t.close);
    fab.setAttribute('aria-label', t.fab);
    starsEl.setAttribute('aria-label', t.starsGroup);
    starBtns.forEach(function (btn, i) {
      btn.setAttribute('aria-label', (i + 1) + ' ' + t.star + ' — ' + RATING_LABELS[i]);
    });
    langBtns.forEach(function (btn) {
      const active = btn.getAttribute('data-lang') === lang;
      btn.classList.toggle('mn-active', active);
      btn.setAttribute('aria-pressed', active ? 'true' : 'false');
    });

    // The follow-up question is language-dependent — refresh it live.
    if (step === 2 && rating > 0) {
      q2El.textContent = QUESTIONS[userType][rating][lang];
    }
  }

  langBtns.forEach(function (btn) {
    btn.addEventListener('click', function () {
      lang = btn.getAttribute('data-lang');
      applyLanguage();
    });
  });

  /* ================================================================
     🪟  OPEN / CLOSE / RESET
     ================================================================ */
  function resetWidget() {
    if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
    if (closeTimer)   { clearTimeout(closeTimer);   closeTimer = null; }
    rating = 0;
    isSending = false;
    textarea.value = '';
    errorEl.hidden = true;
    submitBtn.disabled = false;
    submitBtn.textContent = STRINGS[lang].submit;
    step = 1;
    steps.forEach(function (el, i) { el.hidden = (i !== 0); });
    renderStars();
  }

  function openModal() {
    if (isOpen) return;
    isOpen = true;
    hasOpened = true;
    fab.hidden = true;
    overlay.hidden = false;
    // Next frame, so the entry transition actually plays.
    requestAnimationFrame(function () {
      requestAnimationFrame(function () { overlay.classList.add('mn-open'); });
    });
    starBtns[Math.max(rating, 1) - 1].focus();
  }

  function closeModal() {
    if (!isOpen) return;
    isOpen = false;
    overlay.classList.remove('mn-open');
    setTimeout(function () {
      overlay.hidden = true;
      resetWidget();
      fab.hidden = false;
      fab.focus();          // focus returns to the trigger
    }, 300);
  }

  fab.addEventListener('click', openModal);
  closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', function (e) {
    if (e.target === overlay) closeModal();  // backdrop click only
  });

  // Escape closes; Tab is trapped inside the modal while it is open.
  document.addEventListener('keydown', function (e) {
    if (!isOpen) return;
    if (e.key === 'Escape') { closeModal(); return; }
    if (e.key !== 'Tab') return;
    const focusables = Array.prototype.filter.call(
      modal.querySelectorAll('button, textarea'),
      function (el) {
        return !el.disabled && el.tabIndex !== -1 &&
               el.offsetParent !== null && !el.closest('[hidden]');
      }
    );
    if (!focusables.length) return;
    const first = focusables[0];
    const last  = focusables[focusables.length - 1];
    if (e.shiftKey && document.activeElement === first) {
      e.preventDefault(); last.focus();
    } else if (!e.shiftKey && document.activeElement === last) {
      e.preventDefault(); first.focus();
    }
  });

  /* ================================================================
     📤  FORM SUBMISSION — Google Forms
     POSTs application/x-www-form-urlencoded to the formResponse
     endpoint with mode:'no-cors' (Google Forms sends no CORS headers,
     so the response is opaque — success cannot be read; verify in the
     linked Sheet instead). On any failure the user still sees the
     thank-you screen; the error goes to console.warn only.
     ================================================================ */
  function submitToGoogleForm(data) {
    if (FEEDBACK_CONFIG.formId === 'YOUR_FORM_ID') {
      console.warn('[MY NAGHI feedback] FEEDBACK_CONFIG is not configured yet — submission skipped. Payload:', data);
      return Promise.resolve();
    }
    const endpoint = 'https://docs.google.com/forms/d/e/' +
                     encodeURIComponent(FEEDBACK_CONFIG.formId) + '/formResponse';
    const body = new URLSearchParams();
    body.append(FEEDBACK_CONFIG.fields.language, data.language);
    body.append(FEEDBACK_CONFIG.fields.userType, data.userType);
    body.append(FEEDBACK_CONFIG.fields.rating,   String(data.rating));
    body.append(FEEDBACK_CONFIG.fields.answer,   data.answer);
    body.append(FEEDBACK_CONFIG.fields.pageUrl,  data.pageUrl);
    return fetch(endpoint, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: body.toString()
    });
  }

  submitBtn.addEventListener('click', function () {
    if (isSending) return;
    const answer = sanitize(textarea.value);
    if (!answer) {
      errorEl.textContent = STRINGS[lang].emptyError;
      errorEl.hidden = false;
      textarea.focus();
      return;
    }
    errorEl.hidden = true;
    isSending = true;
    submitBtn.disabled = true;
    submitBtn.textContent = STRINGS[lang].sending;

    submitToGoogleForm({
      language: lang,
      userType: userType,
      rating:   rating,
      answer:   answer,
      pageUrl:  window.location.href
    })
      .catch(function (err) {
        console.warn('[MY NAGHI feedback] submission failed:', err);
      })
      .then(function () {
        if (!isOpen) return;           // user closed while sending
        showStep(3);
        closeTimer = setTimeout(closeModal, 2000);
      });
  });

  // Clear the validation message as soon as the user starts typing.
  textarea.addEventListener('input', function () {
    if (!errorEl.hidden && textarea.value.trim()) errorEl.hidden = true;
  });

  /* ================================================================
     ⏱️  OPTIONAL AUTO-OPEN TRIGGERS (both off by default)
     ================================================================ */
  if (typeof AUTO_OPEN_AFTER_MS === 'number' && AUTO_OPEN_AFTER_MS > 0) {
    setTimeout(function () {
      if (!hasOpened) openModal();
    }, AUTO_OPEN_AFTER_MS);
  }
  if (typeof AUTO_OPEN_ON_SCROLL_PERCENT === 'number' && AUTO_OPEN_ON_SCROLL_PERCENT > 0) {
    const onScroll = function () {
      const max = document.documentElement.scrollHeight - window.innerHeight;
      if (max <= 0) return;
      const pct = (window.scrollY / max) * 100;
      if (pct >= AUTO_OPEN_ON_SCROLL_PERCENT) {
        window.removeEventListener('scroll', onScroll);
        if (!hasOpened) openModal();
      }
    };
    window.addEventListener('scroll', onScroll, { passive: true });
  }

  /* ================================================================
     🚀  INIT
     ================================================================ */
  renderStars();
  applyLanguage();
})();
</script>
