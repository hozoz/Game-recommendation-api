<!--
  =====================================================================
  MY NAGHI — Customer Feedback Widget  (3-Step Edition)
  ---------------------------------------------------------------------
  Self-contained, dependency-free feedback popup for mynaghi.sa.

  Flow:  reason for visit → 5-star rating → optional note → thanks.
  Bilingual (Arabic default / English), full RTL, submits to
  Google Forms.

  HOW TO USE
    - Preview:  open this file directly in a browser.
    - Publish:  see INTEGRATION_GUIDE.md (step-by-step, no coding).

  EVERYTHING EDITABLE LIVES IN LABELLED BLOCKS AT THE TOP OF THE
  <script> SECTION:
    FEEDBACK_CONFIG · SHOW_REASON_PILL · AUTO_OPEN_AFTER_MS ·
    AUTO_OPEN_ON_SCROLL_PERCENT · REASONS · QUESTIONS · STRINGS
  Colors are CSS variables at the top of the <style> block.

  No build step. No frameworks. Vanilla HTML/CSS/JS only.
  =====================================================================
-->
<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MY NAGHI — Feedback Widget</title>
</head>
<body>

<!-- ================= MYNAGHI WIDGET START =================
     To embed: copy everything from this line down to
     "MYNAGHI WIDGET END" and paste it just before </body>. -->

<!-- Space Grotesk — the only external dependency -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
  rel="stylesheet"
/>

<style>
  /* ==============================================================
     COLORS & DESIGN TOKENS
     HOW TO EDIT THIS: change a hex value below and the whole
     widget re-themes. Nothing else needs to be touched.
     ============================================================== */
  #mn-feedback-root {
    --mn-lilac:        #964BFA;   /* primary — active states, CTAs  */
    --mn-lilac-dark:   #6F2DD4;   /* primary button hover           */
    --mn-lilac-subtle: #F2EAFF;   /* option hover bg, thanks circle */
    --mn-black:        #1A1A1A;   /* primary text                   */
    --mn-bluegrey:     #6B7D99;   /* secondary text                 */
    --mn-bluegrey-lt:  #A8B4C8;   /* hints / placeholders           */
    --mn-sand:         #EDE5D0;   /* icon tiles                     */
    --mn-sand-lt:      #F6F1E6;   /* header background              */
    --mn-grey-100:     #F5F5F5;   /* footer, pills                  */
    --mn-grey-200:     #E8E8E8;   /* borders, empty stars           */
    --mn-gold:         #F5B301;   /* filled stars only              */
    --mn-white:        #FFFFFF;

    --mn-radius:       12px;      /* buttons / inputs               */
    --mn-radius-card:  16px;      /* modal card                     */
    --mn-radius-pill:  9999px;    /* pills                          */

    --mn-shadow-card:   0 12px 40px rgba(26, 26, 26, 0.14);
    --mn-shadow-accent: 0 4px 24px rgba(150, 75, 250, 0.2);

    --mn-ease: cubic-bezier(0.25, 0.1, 0.25, 1);

    --mn-font: "Space Grotesk", "Segoe UI", Tahoma, system-ui, sans-serif;
    --mn-z: 2147483000;
  }

  /* ==============================================================
     SCOPING — every rule is prefixed with #mn-feedback-root so the
     widget never leaks styles into (or inherits junk from) the page
     ============================================================== */
  #mn-feedback-root,
  #mn-feedback-root *,
  #mn-feedback-root *::before,
  #mn-feedback-root *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  #mn-feedback-root {
    font-family: var(--mn-font);
    color: var(--mn-black);
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  #mn-feedback-root button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    background: none;
    color: inherit;
  }

  #mn-feedback-root button:focus-visible,
  #mn-feedback-root textarea:focus-visible {
    outline: 2px solid var(--mn-lilac);
    outline-offset: 2px;
  }

  /* ---------------- Floating trigger button ---------------- */
  #mn-feedback-root .mn-fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--mn-lilac);
    color: var(--mn-white);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--mn-shadow-accent);
    z-index: var(--mn-z);
    transition: transform 200ms var(--mn-ease), box-shadow 200ms var(--mn-ease);
  }
  /* In Arabic (RTL) mode the trigger sits bottom-LEFT */
  #mn-feedback-root[data-dir="rtl"] .mn-fab { right: auto; left: 24px; }
  #mn-feedback-root .mn-fab:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(150, 75, 250, 0.32);
  }
  #mn-feedback-root .mn-fab:active { transform: scale(0.98); }
  #mn-feedback-root .mn-fab svg { width: 28px; height: 28px; }
  #mn-feedback-root .mn-fab[hidden] { display: none; }

  /* ---------------- Overlay + modal card ---------------- */
  #mn-feedback-root .mn-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26, 26, 26, 0.5);
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: var(--mn-z);
    opacity: 0;
    transition: opacity 300ms var(--mn-ease);
  }
  #mn-feedback-root .mn-overlay.mn-open { opacity: 1; }
  #mn-feedback-root .mn-overlay[hidden] { display: none; }

  #mn-feedback-root .mn-modal {
    background: var(--mn-white);
    border-radius: var(--mn-radius-card);
    box-shadow: var(--mn-shadow-card);
    width: 100%;
    max-width: 440px;
    max-height: 90vh;
    max-height: 90dvh;
    overflow-y: auto;
    overflow-x: hidden;
    transform: translateY(24px);
    opacity: 0;
    transition: transform 300ms var(--mn-ease), opacity 300ms var(--mn-ease);
  }
  #mn-feedback-root .mn-overlay.mn-open .mn-modal {
    transform: translateY(0);
    opacity: 1;
  }

  /* ---------------- Header ---------------- */
  #mn-feedback-root .mn-header {
    position: relative;
    background: var(--mn-sand-lt);
    padding: 22px 24px 16px;
  }
  #mn-feedback-root .mn-brand {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--mn-bluegrey);
    margin-bottom: 8px;
  }
  #mn-feedback-root .mn-title {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--mn-black);
    padding-inline-end: 40px;   /* keep clear of the close button */
  }
  #mn-feedback-root .mn-subtitle {
    font-size: 15px;
    font-weight: 400;
    color: var(--mn-bluegrey);
    margin-top: 4px;
    min-height: 21px;           /* reserved: steps without a subtitle don't jump */
  }

  /* Close button — flips to the top-LEFT in RTL via inset-inline-end */
  #mn-feedback-root .mn-close {
    position: absolute;
    top: 12px;
    inset-inline-end: 12px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--mn-bluegrey);
    transition: background 150ms var(--mn-ease), color 150ms var(--mn-ease);
  }
  #mn-feedback-root .mn-close:hover { background: var(--mn-sand); color: var(--mn-black); }
  #mn-feedback-root .mn-close:active { transform: scale(0.98); }
  #mn-feedback-root .mn-close svg { width: 18px; height: 18px; }

  /* Language pills + step dots share one row */
  #mn-feedback-root .mn-header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 14px;
  }
  #mn-feedback-root .mn-langs { display: flex; gap: 8px; }
  #mn-feedback-root .mn-lang {
    min-height: 44px;
    padding: 0 20px;
    border-radius: var(--mn-radius-pill);
    background: var(--mn-grey-200);
    color: var(--mn-bluegrey);
    font-size: 14px;
    font-weight: 600;
    transition: background 150ms var(--mn-ease), color 150ms var(--mn-ease),
                transform 150ms var(--mn-ease);
  }
  #mn-feedback-root .mn-lang:hover { background: #DEDEDE; }
  #mn-feedback-root .mn-lang:active { transform: scale(0.98); }
  #mn-feedback-root .mn-lang.mn-active {
    background: var(--mn-lilac);
    color: var(--mn-white);
  }
  #mn-feedback-root .mn-lang.mn-active:hover { background: var(--mn-lilac-dark); }

  /* 3-dot progress indicator (1 = reason, 2 = stars, 3 = note) */
  #mn-feedback-root .mn-dots { display: flex; gap: 6px; align-items: center; }
  #mn-feedback-root .mn-dot {
    width: 8px;
    height: 8px;
    border-radius: var(--mn-radius-pill);
    background: var(--mn-grey-200);
    transition: background 200ms var(--mn-ease), width 200ms var(--mn-ease);
  }
  #mn-feedback-root .mn-dot.mn-done { background: var(--mn-lilac-subtle); }
  #mn-feedback-root .mn-dot.mn-now { background: var(--mn-lilac); width: 20px; }

  /* ---------------- Body / steps ---------------- */
  #mn-feedback-root .mn-body { padding: 20px; }
  #mn-feedback-root .mn-step[hidden] { display: none; }

  /* --- Step 1: reason tiles (built from the REASONS array) --- */
  #mn-feedback-root .mn-reasons { display: flex; flex-direction: column; gap: 10px; }
  #mn-feedback-root .mn-reason {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    min-height: 56px;
    padding: 10px 14px;
    text-align: start;
    background: var(--mn-white);
    border: 1.5px solid var(--mn-grey-200);
    border-radius: var(--mn-radius);
    transition: border-color 150ms var(--mn-ease), background 150ms var(--mn-ease),
                transform 150ms var(--mn-ease);
  }
  #mn-feedback-root .mn-reason:hover,
  #mn-feedback-root .mn-reason:focus-visible {
    border-color: var(--mn-lilac);
    background: var(--mn-lilac-subtle);
    transform: translateY(-1px);
  }
  #mn-feedback-root .mn-reason:active { transform: scale(0.98); }
  #mn-feedback-root .mn-reason-icon {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    border-radius: var(--mn-radius);
    background: var(--mn-sand);
    color: var(--mn-lilac);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #mn-feedback-root .mn-reason-icon svg { width: 22px; height: 22px; }
  #mn-feedback-root .mn-reason-main {
    display: block;
    font-size: 16px;
    font-weight: 500;
    color: var(--mn-black);
  }
  #mn-feedback-root .mn-reason-sub {
    display: block;
    font-size: 13px;
    color: var(--mn-bluegrey-lt);
    margin-top: 1px;
  }

  /* --- Step 2: stars --- */
  #mn-feedback-root .mn-pill {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: fit-content;
    margin: 0 auto 16px;
    padding: 8px 16px;
    border-radius: var(--mn-radius-pill);
    background: var(--mn-grey-100);
    color: var(--mn-bluegrey);
    font-size: 14px;
    font-weight: 500;
  }
  #mn-feedback-root .mn-pill svg { width: 16px; height: 16px; color: var(--mn-lilac); flex-shrink: 0; }
  #mn-feedback-root .mn-pill[hidden] { display: none; }

  /* The row is forced LTR in BOTH languages: star fill always grows
     left→right, the standard convention in Saudi apps. */
  #mn-feedback-root .mn-stars {
    direction: ltr;
    display: flex;
    justify-content: center;
    gap: clamp(0px, 1.5vw, 8px);
    margin-top: 4px;
  }
  #mn-feedback-root .mn-star {
    width: 56px;               /* ≥56px touch target for 40+ users */
    height: 56px;
    flex-shrink: 0;            /* never squeeze below the touch target */
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--mn-radius);
    color: var(--mn-grey-200); /* empty */
    transition: transform 180ms var(--mn-ease), color 180ms var(--mn-ease);
  }
  #mn-feedback-root .mn-star svg { width: 38px; height: 38px; fill: currentColor; }
  #mn-feedback-root .mn-star.mn-on { color: var(--mn-gold); }   /* filled */
  #mn-feedback-root .mn-star:hover,
  #mn-feedback-root .mn-star:focus-visible,
  #mn-feedback-root .mn-star:active { transform: scale(1.15); }

  /* On very narrow phones the star row borrows the body's side
     padding so all five 56px touch targets still fit (5×56 = 280px). */
  @media (max-width: 379px) {
    #mn-feedback-root .mn-stars {
      gap: 0;
      margin-left: -20px;
      margin-right: -20px;
    }
  }

  #mn-feedback-root .mn-caption {
    min-height: 24px;          /* reserved: appearing text never shifts layout */
    margin-top: 14px;
    font-size: 16px;
    font-weight: 600;
    text-align: center;
    color: var(--mn-black);
  }
  #mn-feedback-root .mn-hint {
    margin-top: 6px;
    font-size: 13px;
    text-align: center;
    color: var(--mn-bluegrey-lt);
  }

  /* --- Step 3: optional note --- */
  #mn-feedback-root .mn-mini {
    direction: ltr;
    display: flex;
    justify-content: center;
    gap: 2px;
    margin-bottom: 14px;
    color: var(--mn-grey-200);
  }
  #mn-feedback-root .mn-mini svg { width: 28px; height: 28px; fill: currentColor; }
  #mn-feedback-root .mn-mini svg.mn-on { color: var(--mn-gold); }

  #mn-feedback-root .mn-q-row {
    display: flex;
    align-items: baseline;
    justify-content: center;
    flex-wrap: wrap;
    gap: 6px 10px;
    text-align: center;
  }
  #mn-feedback-root .mn-question {
    font-size: 17px;
    font-weight: 500;
    line-height: 1.4;
    color: var(--mn-black);
    text-align: center;
  }
  #mn-feedback-root .mn-optional {
    flex-shrink: 0;
    padding: 3px 12px;
    border-radius: var(--mn-radius-pill);
    background: var(--mn-grey-100);
    color: var(--mn-bluegrey);
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }

  #mn-feedback-root .mn-textarea {
    width: 100%;
    min-height: 100px;
    margin-top: 14px;
    padding: 14px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 400;
    color: var(--mn-black);
    background: var(--mn-white);
    border: 1.5px solid var(--mn-grey-200);
    border-radius: var(--mn-radius);
    resize: vertical;
    transition: border-color 150ms var(--mn-ease);
  }
  #mn-feedback-root .mn-textarea::placeholder { color: var(--mn-bluegrey-lt); }
  #mn-feedback-root .mn-textarea:focus {
    outline: none;
    border-color: var(--mn-lilac);
  }

  #mn-feedback-root .mn-submit {
    width: 100%;
    min-height: 52px;
    margin-top: 16px;
    border-radius: var(--mn-radius);
    background: var(--mn-lilac);
    color: var(--mn-white);
    font-size: 15px;
    font-weight: 600;
    box-shadow: var(--mn-shadow-accent);
    transition: background 150ms var(--mn-ease), transform 150ms var(--mn-ease),
                opacity 150ms var(--mn-ease);
  }
  #mn-feedback-root .mn-submit:hover:not(:disabled) { background: var(--mn-lilac-dark); }
  #mn-feedback-root .mn-submit:active:not(:disabled) { transform: scale(0.98); }
  #mn-feedback-root .mn-submit:disabled { opacity: 0.7; cursor: default; }

  #mn-feedback-root .mn-helper {
    margin-top: 8px;
    font-size: 13px;
    text-align: center;
    color: var(--mn-bluegrey-lt);
  }

  #mn-feedback-root .mn-back {
    width: 100%;
    min-height: 52px;
    margin-top: 10px;
    border-radius: var(--mn-radius);
    background: transparent;
    border: 1px solid var(--mn-grey-200);
    color: var(--mn-bluegrey);
    font-size: 15px;
    font-weight: 500;
    transition: background 150ms var(--mn-ease), transform 150ms var(--mn-ease);
  }
  #mn-feedback-root .mn-back:hover { background: var(--mn-lilac-subtle); }
  #mn-feedback-root .mn-back:active { transform: scale(0.98); }

  /* --- Step 4: thank you --- */
  #mn-feedback-root .mn-step-4 { text-align: center; padding: 24px 0 16px; }
  #mn-feedback-root .mn-check {
    width: 72px;
    height: 72px;
    margin: 0 auto 16px;
    border-radius: 50%;
    background: var(--mn-lilac-subtle);
    color: var(--mn-lilac);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #mn-feedback-root .mn-check svg { width: 40px; height: 40px; }
  #mn-feedback-root .mn-thanks {
    font-size: 18px;
    font-weight: 600;
    color: var(--mn-black);
  }

  /* ---------------- Footer ---------------- */
  #mn-feedback-root .mn-footer {
    background: var(--mn-grey-100);
    padding: 12px 20px;
    text-align: center;
    font-size: 13px;
    color: var(--mn-bluegrey-lt);
  }

  /* ==============================================================
     MICRO-ANIMATIONS — deliberately subtle: short, composed, and
     all disabled automatically under prefers-reduced-motion.
     ============================================================== */

  /* Each step's content fades in with a small rise when it appears */
  @keyframes mn-step-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #mn-feedback-root .mn-step:not([hidden]) {
    animation: mn-step-in 260ms var(--mn-ease);
  }

  /* Reason tiles cascade in one after another */
  @keyframes mn-tile-in {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #mn-feedback-root .mn-reason {
    animation: mn-tile-in 280ms var(--mn-ease) backwards;
  }
  #mn-feedback-root .mn-reason:nth-child(2) { animation-delay: 45ms; }
  #mn-feedback-root .mn-reason:nth-child(3) { animation-delay: 90ms; }
  #mn-feedback-root .mn-reason:nth-child(4) { animation-delay: 135ms; }
  #mn-feedback-root .mn-reason:nth-child(5) { animation-delay: 180ms; }
  #mn-feedback-root .mn-reason:nth-child(6) { animation-delay: 225ms; }
  #mn-feedback-root .mn-reason:nth-child(7) { animation-delay: 270ms; }
  #mn-feedback-root .mn-reason:nth-child(8) { animation-delay: 315ms; }

  /* Stars pop one-by-one when a rating is confirmed (driven from JS
     so the hover preview stays quiet) */
  @keyframes mn-pop {
    0%   { transform: scale(1); }
    45%  { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  /* Thank-you: the circle scales in, then the checkmark draws itself */
  @keyframes mn-check-in {
    from { opacity: 0; transform: scale(0.5); }
    to   { opacity: 1; transform: scale(1); }
  }
  #mn-feedback-root .mn-check { animation: mn-check-in 350ms var(--mn-ease); }
  #mn-feedback-root .mn-check path {
    stroke-dasharray: 24;
    stroke-dashoffset: 24;
    animation: mn-draw 350ms var(--mn-ease) 200ms forwards;
  }
  @keyframes mn-draw { to { stroke-dashoffset: 0; } }

  /* A soft pulse ring on the floating button every few seconds */
  @keyframes mn-ring {
    0%   { box-shadow: 0 0 0 0 rgba(150, 75, 250, 0.35); }
    18%  { box-shadow: 0 0 0 14px rgba(150, 75, 250, 0); }
    100% { box-shadow: 0 0 0 14px rgba(150, 75, 250, 0); }
  }
  #mn-feedback-root .mn-fab::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    pointer-events: none;
    animation: mn-ring 7s var(--mn-ease) 2s infinite;
  }

  /* ---------------- Reduced motion ---------------- */
  @media (prefers-reduced-motion: reduce) {
    #mn-feedback-root *,
    #mn-feedback-root *::before,
    #mn-feedback-root *::after {
      transition: none !important;
      animation: none !important;
    }
    /* without the draw animation the checkmark must be visible */
    #mn-feedback-root .mn-check path {
      stroke-dasharray: none;
      stroke-dashoffset: 0;
    }
  }
</style>

<div id="mn-feedback-root" data-dir="rtl">

  <!-- Floating trigger (star line icon) -->
  <button class="mn-fab" type="button" aria-haspopup="dialog">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
      <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.26L7 14.14 2 9.27l6.91-1.01z"/>
    </svg>
  </button>

  <!-- Modal -->
  <div class="mn-overlay" hidden>
    <div class="mn-modal" role="dialog" aria-modal="true" aria-labelledby="mn-title">

      <header class="mn-header">
        <button class="mn-close" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" aria-hidden="true" focusable="false">
            <path d="M6 6l12 12M18 6L6 18"/>
          </svg>
        </button>
        <div class="mn-brand">MY NAGHI</div>
        <h2 class="mn-title" id="mn-title"></h2>
        <p class="mn-subtitle"></p>
        <div class="mn-header-row">
          <div class="mn-langs">
            <button class="mn-lang" type="button" data-lang="ar" lang="ar">العربية</button>
            <button class="mn-lang" type="button" data-lang="en" lang="en">EN</button>
          </div>
          <div class="mn-dots" role="img">
            <span class="mn-dot"></span><span class="mn-dot"></span><span class="mn-dot"></span>
          </div>
        </div>
      </header>

      <div class="mn-body">

        <!-- STEP 1 — reason for visit (tiles are built from REASONS) -->
        <section class="mn-step mn-step-1">
          <div class="mn-reasons"></div>
        </section>

        <!-- STEP 2 — star rating -->
        <section class="mn-step mn-step-2" hidden>
          <div class="mn-pill"></div>
          <div class="mn-stars" role="radiogroup">

  const STRINGS = {

  /* ================================================================

     ================================================================ */
  const ICONS = {
    'car': '<path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/>',
    'eye': '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>',
    'wrench': '<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>',

    'tag': '<path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"/><circle cx="7.5" cy="7.5" r=".5" fill="currentColor"/>',

    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" ' +

           (ICONS[name] || ICONS['message-square']) + '</svg>';
  }

  /* ================================================================
     🔎  HELPERS
     ================================================================ */

  // Arabic is the default: only an explicitly-English page/browser
  // starts in English; anything else (Arabic or undetermined) → Arabic.
  function detectLanguage() {
    const raw = (document.documentElement.lang || navigator.language || '').toLowerCase();
    return raw.indexOf('en') === 0 ? 'en' : 'ar';
  }

  // Strip control characters and cap length. User text is only ever
  // written to the page via textContent / value (never innerHTML),
  // so it can never be interpreted as markup.
  function sanitize(value) {
    return value.replace(/[\u0000-\u001F\u007F]/g, ' ')
                .trim()
                .slice(0, 2000);
  }

  // The follow-up question for the current reason + rating + language.
  // Falls back to a generic question if a reason's set was removed,
  // so editing REASONS can never crash the widget.
  function getQuestion() {
    const set = QUESTIONS[reasonId];
    const q = set && set[lang] && set[lang][rating];
    return q || STRINGS[lang].fallbackQuestion;
  }

  function findReason(id) {
    for (let i = 0; i < REASONS.length; i++) {
      if (REASONS[i].id === id) return REASONS[i];
    }
    return null;
  }

  /* ================================================================
     🧩  ELEMENTS & STATE
     ================================================================ */
  const root = document.getElementById('mn-feedback-root');
  if (!root) return;
  const $ = (sel) => root.querySelector(sel);

  const fab       = $('.mn-fab');
  const overlay   = $('.mn-overlay');
  const modal     = $('.mn-modal');
  const closeBtn  = $('.mn-close');
  const titleEl   = $('.mn-title');
  const subtitleEl= $('.mn-subtitle');
  const langBtns  = Array.prototype.slice.call(root.querySelectorAll('.mn-lang'));

  const dots      = Array.prototype.slice.call(root.querySelectorAll('.mn-dot'));
  const steps     = [$('.mn-step-1'), $('.mn-step-2'), $('.mn-step-3'), $('.mn-step-4')];
  const reasonsEl = $('.mn-reasons');
  const pillEl    = $('.mn-pill');
  const starsEl   = $('.mn-stars');
  const starBtns  = Array.prototype.slice.call(root.querySelectorAll('.mn-star'));
  const captionEl = $('.mn-caption');
  const miniEl    = $('.mn-mini');
  const q3El      = $('.mn-q3');
  const textarea  = $('.mn-textarea');
  const submitBtn = $('.mn-submit');
  const helperEl  = $('.mn-helper');
  const backBtn   = $('.mn-back');
  const thanksEl  = $('.mn-thanks');
  const footerEl  = $('.mn-footer-text');

  let lang      = detectLanguage();
  let reasonId  = null;       // set on step 1
  let rating    = 0;          // 0 = nothing selected yet
  let step      = 1;
  let isOpen    = false;
  let isSending = false;
  let hasOpened = false;      // auto-open fires at most once per page
  let advanceTimer = null;    // 400ms pause between star tap and step 3
  let closeTimer   = null;    // 2s thank-you auto-close

  // Build the 5 read-only mini stars shown at the top of step 3.
  const STAR_SVG = starBtns[0].querySelector('svg').outerHTML;
  miniEl.innerHTML = STAR_SVG + STAR_SVG + STAR_SVG + STAR_SVG + STAR_SVG;
  const miniStars = Array.prototype.slice.call(miniEl.querySelectorAll('svg'));

  /* ================================================================
     📋  STEP 1 — reason tiles, generated from the REASONS array so
     reordering/removing/adding reasons needs no other code changes.
     Tiles show the current language as the main label and the other
     language muted beneath it. (Icon markup comes from the trusted
     ICONS config above — never from user input.)
     ================================================================ */
  reasonsEl.innerHTML = REASONS.map(function (r) {
    return '<button class="mn-reason" type="button" data-id="' + r.id + '">' +
             '<span class="mn-reason-icon">' + iconSvg(r.icon) + '</span>' +

  }).join('');
  const reasonBtns = Array.prototype.slice.call(reasonsEl.querySelectorAll('.mn-reason'));

  function renderReasonLabels() {
    const other = lang === 'ar' ? 'en' : 'ar';
    reasonBtns.forEach(function (btn) {
      const r = findReason(btn.getAttribute('data-id'));
      if (!r) return;
      btn.querySelector('.mn-reason-main').textContent = r[lang];
      btn.querySelector('.mn-reason-sub').textContent  = r[other];
    });
  }

  reasonBtns.forEach(function (btn) {
    btn.addEventListener('click', function () {
      reasonId = btn.getAttribute('data-id');
      showStep(2);
    });
  });

  /* ================================================================
     ⭐  STEP 2 — star fill logic
     Tapping star N fills stars 1..N gold. `renderStars` paints the
     committed rating; `paintFill` also drives the hover preview.
     ================================================================ */
  function paintFill(n) {
    starBtns.forEach(function (btn, i) {
      btn.classList.toggle('mn-on', i < n);
    });
  }

  function renderStars() {
    paintFill(rating);
    starBtns.forEach(function (btn, i) {
      const value = i + 1;
      btn.setAttribute('aria-checked', value === rating ? 'true' : 'false');
      // Roving tabindex: the selected star (or the first, before any
      // selection) is the group's single tab stop.
      btn.tabIndex = (rating === 0 ? value === 1 : value === rating) ? 0 : -1;
    });
    captionEl.textContent = rating > 0 ? RATING_LABELS[rating - 1] : '';
  }

  // Select a rating (fill + caption + a11y state) without advancing.
  function selectRating(n) {
    if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
    rating = n;
    renderStars();
  }

  // On confirm, the filled stars pop one-by-one (left to right).
  // Inline animations lose to the reduced-motion !important rules,
  // so this stays quiet for users who prefer no motion.
  function popStars(svgs, n, stagger) {
    svgs.forEach(function (svg, i) {
      svg.style.animation = 'none';
      if (i < n) {
        void svg.offsetWidth;   // reflow so the animation restarts
        svg.style.animation = 'mn-pop 320ms var(--mn-ease) ' + (i * stagger) + 'ms';
      }
    });
  }

  // Confirm the rating: let the user see the fill (and the pop
  // finish, ~500ms for five stars), then go to step 3.
  function confirmRating(n) {
    selectRating(n);
    popStars(starBtns.map(function (b) { return b.querySelector('svg'); }), n, 45);
    advanceTimer = setTimeout(function () {
      advanceTimer = null;
      showStep(3);
    }, 550);
  }

  starBtns.forEach(function (btn) {
    const value = parseInt(btn.getAttribute('data-value'), 10);
    // Click also covers Enter/Space on the focused star.
    btn.addEventListener('click', function () { confirmRating(value); });
    // Desktop hover preview: fill 1..N under the cursor.
    btn.addEventListener('mouseenter', function () {
      if (step === 2) paintFill(value);
    });

  // The row is visually LTR in both languages, so Right = higher.
  starsEl.addEventListener('keydown', function (e) {

    if (e.key === 'ArrowRight' || e.key === 'ArrowUp') delta = 1;
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') delta = -1;
    else return;
    e.preventDefault();
    const next = Math.min(5, Math.max(1, (rating || 0) + delta));
    selectRating(next);
    starBtns[next - 1].focus();
  });

     🪜  STEPS — header (title/subtitle/dots) and body change together
     ================================================================ */
  function renderHeader() {
    const t = STRINGS[lang];

    dots.forEach(function (d, i) {
      d.classList.toggle('mn-now', i + 1 === now);
      d.classList.toggle('mn-done', i + 1 < now);
    });
    dotsEl.setAttribute('aria-label', t.stepLabel.replace('{n}', String(now)));

  function showStep(n) {
    step = n;
    steps.forEach(function (el, i) { el.hidden = (i + 1 !== n); });
    renderHeader();

    if (n === 1) {
      reasonBtns[0] && reasonBtns[0].focus();
    } else if (n === 2) {
      renderPill();
      renderStars();
      starBtns[Math.max(rating, 1) - 1].focus();
    } else if (n === 3) {
      q3El.textContent = getQuestion();
      miniStars.forEach(function (svg, i) {
        svg.classList.toggle('mn-on', i < rating);
      });
      popStars(miniStars, rating, 40);
      textarea.focus();
    }
  }

  backBtn.addEventListener('click', function () { showStep(2); });

  /* ================================================================
     🌐  LANGUAGE & RTL SWITCHING
     Re-paints every visible string and flips direction. The modal
     gets dir=rtl/ltr (mirroring the whole layout, incl. the close
     button via inset-inline-end); the root's data-dir moves the
     floating button; the star row itself stays LTR by design.
     ================================================================ */
  function applyLanguage() {
    const t = STRINGS[lang];
    root.setAttribute('data-dir', t.dir);
    modal.setAttribute('dir', t.dir);
    modal.setAttribute('lang', lang);

    thanksEl.textContent = t.thanks;
    footerEl.textContent = t.footer;
    helperEl.textContent = t.helper;
    if (isSending) submitBtn.textContent = t.sending;
    textarea.setAttribute('placeholder', t.placeholder);
    closeBtn.setAttribute('aria-label', t.close);
    fab.setAttribute('aria-label', t.fab);
    starsEl.setAttribute('aria-label', t.starsGroup);
    starBtns.forEach(function (btn, i) {
      btn.setAttribute('aria-label', (i + 1) + ' ' + t.star + ' — ' + RATING_LABELS[i]);
    });
    langBtns.forEach(function (btn) {
      const active = btn.getAttribute('data-lang') === lang;
      btn.classList.toggle('mn-active', active);
      btn.setAttribute('aria-pressed', active ? 'true' : 'false');
    });

    // Step-dependent text: header, reason tiles, pill, and the
    // follow-up question all refresh live, even mid-flow.
    renderHeader();
    renderReasonLabels();
    if (step >= 2) renderPill();
    if (step === 3) q3El.textContent = getQuestion();
  }

  langBtns.forEach(function (btn) {
    btn.addEventListener('click', function () {
      lang = btn.getAttribute('data-lang');
      applyLanguage();
    });
  });

  /* ================================================================
     🪟  OPEN / CLOSE / RESET
     ================================================================ */
  function resetWidget() {
    if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
    if (closeTimer)   { clearTimeout(closeTimer);   closeTimer = null; }
    reasonId = null;
    rating = 0;
    isSending = false;
    textarea.value = '';
    submitBtn.disabled = false;
    submitBtn.textContent = 'إرسال · Send';
    step = 1;
    steps.forEach(function (el, i) { el.hidden = (i !== 0); });
    renderStars();
    renderHeader();
  }

  function openModal() {
    if (isOpen) return;
    isOpen = true;
    hasOpened = true;
    fab.hidden = true;
    overlay.hidden = false;
    // Next frame, so the entry transition actually plays.
    requestAnimationFrame(function () {
      requestAnimationFrame(function () { overlay.classList.add('mn-open'); });
    });
    reasonBtns[0] && reasonBtns[0].focus();
  }

  function closeModal() {
    if (!isOpen) return;
    isOpen = false;
    overlay.classList.remove('mn-open');
    setTimeout(function () {
      overlay.hidden = true;
      resetWidget();
      fab.hidden = false;
      fab.focus();          // focus returns to the trigger
    }, 300);
  }

  fab.addEventListener('click', openModal);
  closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', function (e) {
    if (e.target === overlay) closeModal();  // backdrop click only
  });

  // Escape closes; Tab is trapped inside the modal while it is open.
  document.addEventListener('keydown', function (e) {
    if (!isOpen) return;
    if (e.key === 'Escape') { closeModal(); return; }
    if (e.key !== 'Tab') return;
    const focusables = Array.prototype.filter.call(
      modal.querySelectorAll('button, textarea'),
      function (el) {
        return !el.disabled && el.tabIndex !== -1 &&
               el.offsetParent !== null && !el.closest('[hidden]');
      }
    );
    if (!focusables.length) return;
    const first = focusables[0];
    const last  = focusables[focusables.length - 1];
    if (e.shiftKey && document.activeElement === first) {
      e.preventDefault(); last.focus();
    } else if (!e.shiftKey && document.activeElement === last) {
      e.preventDefault(); first.focus();
    }
  });

  /* ================================================================
     📤  FORM SUBMISSION — Google Forms
     POSTs application/x-www-form-urlencoded to the formResponse
     endpoint with mode:'no-cors' (Google Forms sends no CORS headers,
     so the response is opaque — success cannot be read; verify in the
     linked Sheet instead). The note may be empty — that is a normal,
     complete submission. On any failure the user still sees the
     thank-you screen; the error goes to console.warn only.
     ================================================================ */
  function submitToGoogleForm(data) {
    if (FEEDBACK_CONFIG.formId === 'YOUR_FORM_ID') {
      console.warn('[MY NAGHI feedback] FEEDBACK_CONFIG is not configured yet — submission skipped. Payload:', data);
      return Promise.resolve();
    }
    const endpoint = 'https://docs.google.com/forms/d/e/' +
                     encodeURIComponent(FEEDBACK_CONFIG.formId) + '/formResponse';
    const body = new URLSearchParams();
    body.append(FEEDBACK_CONFIG.fields.language, data.language);
    body.append(FEEDBACK_CONFIG.fields.reason,   data.reason);
    body.append(FEEDBACK_CONFIG.fields.rating,   String(data.rating));
    body.append(FEEDBACK_CONFIG.fields.answer,   data.answer);
    body.append(FEEDBACK_CONFIG.fields.pageUrl,  data.pageUrl);
    return fetch(endpoint, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: body.toString()
    });
  }

  submitBtn.addEventListener('click', function () {
    if (isSending) return;
    isSending = true;
    submitBtn.disabled = true;
    submitBtn.textContent = STRINGS[lang].sending;

    submitToGoogleForm({
      language: lang,
      reason:   reasonId || 'other',
      rating:   rating,
      answer:   sanitize(textarea.value),   // may be '' — that's fine
      pageUrl:  window.location.href
    })
      .catch(function (err) {
        console.warn('[MY NAGHI feedback] submission failed:', err);
      })
      .then(function () {
        if (!isOpen) return;           // user closed while sending
        showStep(4);
        closeTimer = setTimeout(closeModal, 2000);
      });
  });

  /* ================================================================
     ⏱️  OPTIONAL AUTO-OPEN TRIGGERS (both off by default)
     ================================================================ */
  if (typeof AUTO_OPEN_AFTER_MS === 'number' && AUTO_OPEN_AFTER_MS > 0) {
    setTimeout(function () {
      if (!hasOpened) openModal();
    }, AUTO_OPEN_AFTER_MS);
  }
  if (typeof AUTO_OPEN_ON_SCROLL_PERCENT === 'number' && AUTO_OPEN_ON_SCROLL_PERCENT > 0) {
    const onScroll = function () {
      const max = document.documentElement.scrollHeight - window.innerHeight;
      if (max <= 0) return;
      const pct = (window.scrollY / max) * 100;
      if (pct >= AUTO_OPEN_ON_SCROLL_PERCENT) {
        window.removeEventListener('scroll', onScroll);
        if (!hasOpened) openModal();
      }
    };
    window.addEventListener('scroll', onScroll, { passive: true });
  }

  /* ================================================================
     🚀  INIT
     ================================================================ */
  renderStars();
  applyLanguage();
})();
</script>

<!-- ================= MYNAGHI WIDGET END ================= -->

</body>
